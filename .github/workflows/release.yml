name: Release SDKs

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  SMITHY_VERSION: "1.72.0"

jobs:
  validate-release:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Parse semver tag
        id: version
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected tag like v1.2.3, got $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check Python, Rust, and Zig package versions
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          expected = os.environ["RELEASE_VERSION"]
          pyproject = tomllib.loads(Path("python/pyproject.toml").read_text())
          python_version = pyproject["project"]["version"]
          if python_version != expected:
              raise SystemExit(f"python/pyproject.toml version {python_version!r} != tag {expected!r}")

          cargo = tomllib.loads(Path("rust/Cargo.toml").read_text())
          rust_version = cargo["package"]["version"]
          if rust_version != expected:
              raise SystemExit(f"rust/Cargo.toml version {rust_version!r} != tag {expected!r}")

          zon = Path("build.zig.zon").read_text()
          match = re.search(r'\.version\s*=\s*"([^"]+)"', zon)
          zig_version = match.group(1) if match else None
          if zig_version != expected:
              raise SystemExit(f"build.zig.zon version {zig_version!r} != tag {expected!r}")
          PY
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}

  verify-generated:
    name: Verify generated SDKs
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java for Smithy codegen
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: smithy/generator/pom.xml

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Set up Zig
        uses: mlugg/setup-zig@v2

      - name: Install Smithy CLI
        run: |
          curl -fsSL -o "$RUNNER_TEMP/smithy-cli.zip" \
            "https://github.com/smithy-lang/smithy/releases/download/${SMITHY_VERSION}/smithy-cli-linux-x86_64.zip"
          unzip -q "$RUNNER_TEMP/smithy-cli.zip" -d "$RUNNER_TEMP/smithy-cli"
          smithy_bin="$(find "$RUNNER_TEMP/smithy-cli" -type f -path "*/bin/smithy" | head -n 1)"
          if [ -z "$smithy_bin" ]; then
            echo "Could not find smithy binary in extracted archive" >&2
            exit 1
          fi
          echo "$(dirname "$smithy_bin")" >> "$GITHUB_PATH"

      - name: Validate Smithy model
        run: smithy validate smithy/model

      - name: Regenerate and test SDKs
        run: ./build.sh

      - name: Check generated sources are committed
        run: git diff --exit-code -- go python rust zig build.zig build.zig.zon

  publish-go:
    name: Publish Go module
    runs-on: ubuntu-latest
    needs: verify-generated
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod

      - name: Test Go SDK
        run: go test ./...

      - name: Prime Go module proxy
        run: |
          module="github.com/its-felix/superhuman-docs-sdk"
          version="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5 6; do
            if GOPROXY=https://proxy.golang.org go list -m "${module}@${version}"; then
              exit 0
            fi
            echo "Go proxy did not return ${module}@${version}; retrying (${attempt}/6)"
            sleep 10
          done
          GOPROXY=https://proxy.golang.org go list -m "${module}@${version}"

  build-python:
    name: Build Python distribution
    runs-on: ubuntu-latest
    needs: verify-generated
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Test Python SDK
        working-directory: python
        run: python -m unittest discover -s tests

      - name: Build Python package
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist python

      - name: Upload Python distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  publish-python:
    name: Publish Python package
    runs-on: ubuntu-latest
    needs: build-python
    environment:
      name: pypi
      url: https://pypi.org/p/superhuman-docs
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download Python distribution artifact
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist

      - name: Publish package to PyPI
        if: false
        uses: pypa/gh-action-pypi-publish@release/v1

  validate-rust:
    name: Validate Rust crate tag
    runs-on: ubuntu-latest
    needs: verify-generated
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Test Rust crate
        run: cargo test -p superhuman-docs

  publish-zig:
    name: Validate Zig package tag
    runs-on: ubuntu-latest
    needs: verify-generated
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2

      - name: Test Zig SDK
        run: zig build test

      - name: Verify Zig package can be fetched
        run: zig fetch --global-cache-dir "$RUNNER_TEMP/zig-cache" .
